<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Flowchart — Pembuatan Akun Operasional</title>
  <style>
    @page { size: A4 portrait; margin: 8mm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: white; font-family: Arial, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    svg { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1310">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- ──────────────── BACKGROUND ──────────────── -->
  <rect width="760" height="1310" fill="#ffffff"/>

  <!-- ──────────────── TITLE ──────────────── -->
  <rect x="20" y="10" width="720" height="54" rx="5" fill="#1a237e"/>
  <text x="380" y="32" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">FLOWCHART — Pembuatan Akun Operasional (Supervisor / Staff)</text>
  <text x="380" y="52" text-anchor="middle" fill="#90caf9" font-size="10" font-family="Arial">Aktor: Manager  |  Modul: Settings → Akun Operasional  |  Backend: SettingsController@storeStaff</text>

  <!-- ──────────────── 1. TERMINATOR: MULAI ──────────────── -->
  <ellipse cx="380" cy="99" rx="90" ry="22" fill="#c5cae9" stroke="#1a237e" stroke-width="2"/>
  <text x="380" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e" font-family="Arial">MULAI</text>

  <line x1="380" y1="121" x2="380" y2="144" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 2. PROCESS: Manager login ──────────────── -->
  <rect x="230" y="148" width="300" height="38" rx="3" fill="#bbdefb" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="380" y="172" text-anchor="middle" font-size="11" fill="#0d47a1" font-family="Arial">Manager login ke sistem</text>

  <line x1="380" y1="186" x2="380" y2="209" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 3. PROCESS: Buka Settings ──────────────── -->
  <rect x="185" y="213" width="390" height="38" rx="3" fill="#bbdefb" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="380" y="237" text-anchor="middle" font-size="11" fill="#0d47a1" font-family="Arial">Buka Settings → Tab Akun Operasional</text>

  <line x1="380" y1="251" x2="380" y2="274" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 4. MANUAL OPERATION: Klik Buat Akun (trapezoid) ──────────────── -->
  <!-- top wider, bottom narrower = Manual Operation -->
  <polygon points="225,278 535,278 515,316 245,316" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="380" y="301" text-anchor="middle" font-size="11" fill="#1565c0" font-family="Arial">Klik tombol "Buat Akun Baru"</text>

  <line x1="380" y1="316" x2="380" y2="336" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 5. MANUAL INPUT: Isi Form (parallelogram slanted top) ──────────────── -->
  <!-- slant: top edge shifts right +20, bottom edge shifts left -20 -->
  <polygon points="200,340 560,340 540,428 180,428" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="365" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#bf360c" font-family="Arial">Isi form:</text>
  <text x="210" y="378" font-size="9" fill="#bf360c" font-family="Arial">• Nama (wajib, maks 100 karakter)</text>
  <text x="210" y="393" font-size="9" fill="#bf360c" font-family="Arial">• Email (wajib, unik)    •  No. Telepon (opsional)</text>
  <text x="210" y="408" font-size="9" fill="#bf360c" font-family="Arial">• Role: Supervisor / Staff</text>
  <text x="210" y="422" font-size="9" fill="#bf360c" font-family="Arial">• Password + Konfirmasi Password</text>

  <line x1="380" y1="428" x2="380" y2="448" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 6. MANUAL OPERATION: Klik Submit (trapezoid) ──────────────── -->
  <polygon points="225,452 535,452 515,490 245,490" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="380" y="475" text-anchor="middle" font-size="11" fill="#1565c0" font-family="Arial">Klik Simpan / Submit</text>

  <line x1="380" y1="490" x2="380" y2="510" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 7. DECISION: Validasi input berhasil? ──────────────── -->
  <!-- diamond center (380, 555), hw=100, hh=47 -->
  <polygon points="380,513 480,558 380,603 280,558" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="380" y="552" text-anchor="middle" font-size="10" fill="#5d4037" font-family="Arial">Validasi input</text>
  <text x="380" y="566" text-anchor="middle" font-size="10" fill="#5d4037" font-family="Arial">berhasil?</text>

  <!-- GAGAL → error box 1 (right) -->
  <line x1="480" y1="558" x2="492" y2="558" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="487" y="550" text-anchor="middle" font-size="8" fill="#c62828" font-weight="bold" font-family="Arial">GAGAL</text>
  <!-- Error 1 box -->
  <rect x="496" y="534" width="165" height="48" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="578" y="554" text-anchor="middle" font-size="9" fill="#c62828" font-family="Arial">Tampilkan pesan error</text>
  <text x="578" y="570" text-anchor="middle" font-size="9" fill="#c62828" font-family="Arial">validasi pada form</text>

  <!-- YA → Decision 2 -->
  <line x1="380" y1="603" x2="380" y2="626" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="392" y="617" font-size="9" fill="#2e7d32" font-weight="bold" font-family="Arial">YA</text>

  <!-- ──────────────── 8. DECISION: Email sudah terdaftar? ──────────────── -->
  <!-- diamond center (380, 672), hw=100, hh=47 -->
  <polygon points="380,630 480,675 380,720 280,675" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="380" y="669" text-anchor="middle" font-size="10" fill="#5d4037" font-family="Arial">Email sudah</text>
  <text x="380" y="683" text-anchor="middle" font-size="10" fill="#5d4037" font-family="Arial">terdaftar?</text>

  <!-- YA → error box 2 (right) -->
  <line x1="480" y1="675" x2="492" y2="675" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="487" y="667" text-anchor="middle" font-size="8" fill="#c62828" font-weight="bold" font-family="Arial">YA</text>
  <!-- Error 2 box -->
  <rect x="496" y="651" width="165" height="48" rx="3" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="578" y="671" text-anchor="middle" font-size="9" fill="#c62828" font-family="Arial">Error: "Email sudah</text>
  <text x="578" y="687" text-anchor="middle" font-size="9" fill="#c62828" font-family="Arial">digunakan"</text>

  <!-- ──── RIGHT RAIL: Both errors return to form (Isi Form) ──── -->
  <!-- Rail at x=676 (right of error boxes: 496+165+15=676) -->
  <!-- Path: from x=661 down rail, connects at error box right edges -->
  <!-- Error 1 right (661, 558) → rail (676, 558) -->
  <line x1="661" y1="558" x2="676" y2="558" stroke="#c62828" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Error 2 right (661, 675) → rail (676, 675) -->
  <line x1="661" y1="675" x2="676" y2="675" stroke="#c62828" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Rail vertical: (676, 675) → up → (676, 335) -->
  <line x1="676" y1="675" x2="676" y2="335" stroke="#c62828" stroke-width="1.2" stroke-dasharray="5,3"/>
  <!-- Rail → back into form top (540, 335) → with arrowhead -->
  <line x1="676" y1="335" x2="542" y2="335" stroke="#c62828" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <!-- Label on rail -->
  <text font-size="8" fill="#c62828" font-family="Arial" font-style="italic" transform="translate(684,540) rotate(90)">← kembali isi form</text>

  <!-- TIDAK (email unik) → Process 9 -->
  <line x1="380" y1="720" x2="380" y2="743" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="393" y="734" font-size="9" fill="#2e7d32" font-weight="bold" font-family="Arial">TIDAK</text>

  <!-- ──────────────── 9. PROCESS: Ambil role_id ──────────────── -->
  <rect x="195" y="747" width="370" height="42" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="380" y="764" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="Arial">Ambil role_id dari tabel roles</text>
  <text x="380" y="781" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="Arial">sesuai nama (Supervisor / Staff)</text>

  <line x1="380" y1="789" x2="380" y2="809" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 10. PROCESS: Simpan user ke DB ──────────────── -->
  <rect x="175" y="813" width="410" height="108" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="380" y="833" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20" font-family="Arial">Simpan user baru ke tabel users:</text>
  <text x="193" y="851" font-size="9" fill="#1b5e20" font-family="Arial">• role_id  →  sesuai pilihan (Supervisor / Staff)</text>
  <text x="193" y="867" font-size="9" fill="#1b5e20" font-family="Arial">• name, email, phone  →  dari form</text>
  <text x="193" y="883" font-size="9" fill="#1b5e20" font-family="Arial">• password  →  di-hash dengan bcrypt</text>
  <text x="193" y="899" font-size="9" fill="#1b5e20" font-family="Arial">• email_verified_at  →  now()  (auto-verified)</text>
  <text x="193" y="915" font-size="9" fill="#1b5e20" font-family="Arial">• status  →  'active'  (langsung aktif)</text>

  <line x1="380" y1="921" x2="380" y2="941" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 11. PROCESS: Redirect ──────────────── -->
  <rect x="195" y="945" width="370" height="42" rx="3" fill="#bbdefb" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="380" y="963" text-anchor="middle" font-size="10" fill="#0d47a1" font-family="Arial">Redirect → Settings</text>
  <text x="380" y="980" text-anchor="middle" font-size="10" fill="#0d47a1" font-family="Arial">Tab Akun Operasional</text>

  <line x1="380" y1="987" x2="380" y2="1007" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 12. PROCESS: Notifikasi sukses ──────────────── -->
  <rect x="175" y="1011" width="410" height="42" rx="3" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="380" y="1030" text-anchor="middle" font-size="10" fill="#6a1b9a" font-family="Arial">Tampil notifikasi:</text>
  <text x="380" y="1046" text-anchor="middle" font-size="10" fill="#6a1b9a" font-family="Arial">"Akun operasional berhasil dibuat"</text>

  <line x1="380" y1="1053" x2="380" y2="1073" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 13. PROCESS: Akun aktif ──────────────── -->
  <rect x="175" y="1077" width="410" height="40" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="380" y="1102" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20" font-family="Arial">Akun aktif — siap digunakan untuk login</text>

  <line x1="380" y1="1117" x2="380" y2="1137" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────── 14. TERMINATOR: SELESAI ──────────────── -->
  <ellipse cx="380" cy="1160" rx="90" ry="22" fill="#1a237e" stroke="#1a237e" stroke-width="2"/>
  <text x="380" y="1165" text-anchor="middle" font-size="13" font-weight="bold" fill="white" font-family="Arial">SELESAI</text>

  <!-- ──────────────── LEGEND ──────────────── -->
  <rect x="20" y="1198" width="720" height="100" rx="5" fill="#f5f5f5" stroke="#b0bec5" stroke-width="1"/>
  <text x="380" y="1217" text-anchor="middle" font-size="10" font-weight="bold" fill="#263238" font-family="Arial">LEGENDA SIMBOL FLOWCHART (Standar)</text>

  <!-- Row 1 -->
  <ellipse cx="65" cy="1237" rx="44" ry="14" fill="#c5cae9" stroke="#1a237e" stroke-width="1"/>
  <text x="65" y="1242" text-anchor="middle" font-size="8" fill="#1a237e" font-family="Arial">Terminator</text>
  <text x="117" y="1242" font-size="9" fill="#555" font-family="Arial">= Mulai / Selesai</text>

  <rect x="225" y="1224" width="82" height="26" rx="2" fill="#bbdefb" stroke="#0d47a1" stroke-width="1"/>
  <text x="266" y="1241" text-anchor="middle" font-size="8" fill="#0d47a1" font-family="Arial">Process</text>
  <text x="314" y="1241" font-size="9" fill="#555" font-family="Arial">= Proses komputer</text>

  <polygon points="455,1224 510,1224 501,1250 446,1250" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="478" y="1241" text-anchor="middle" font-size="8" fill="#795548" font-family="Arial">Decision</text>
  <text x="518" y="1241" font-size="9" fill="#555" font-family="Arial">= Kondisi / Keputusan</text>

  <!-- Row 2 -->
  <polygon points="38,1262 118,1262 108,1286 48,1286" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="80" y="1278" text-anchor="middle" font-size="8" fill="#e65100" font-family="Arial">Manual Input</text>
  <text x="126" y="1278" font-size="9" fill="#555" font-family="Arial">= Input keyboard user</text>

  <polygon points="254,1256 356,1256 340,1286 270,1286" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="307" y="1275" text-anchor="middle" font-size="8" fill="#1565c0" font-family="Arial">Manual Operation</text>
  <text x="362" y="1275" font-size="9" fill="#555" font-family="Arial">= Aksi manual user</text>

  <rect x="473" y="1258" width="80" height="28" rx="2" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="513" y="1276" text-anchor="middle" font-size="8" fill="#c62828" font-family="Arial">Error</text>
  <text x="560" y="1276" font-size="9" fill="#555" font-family="Arial">= Kondisi gagal</text>

  <!-- Footer -->
  <text x="380" y="1305" text-anchor="middle" font-size="8" fill="#90a4ae" font-family="Arial">
    Sistem Manajemen Inventori Pergudangan  —  Flowchart Pembuatan Akun Operasional  —  2026
  </text>
</svg>
</body>
</html>
