# Enable AndroidX and Jetifier
android.useAndroidX=true
android.enableJetifier=true

# Optimasi Build
# Naikkan heap Gradle untuk proyek Android agar tidak gampang bottleneck.
# Jika RAM laptop terbatas, turunkan ke -Xmx2048m.
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn
kotlin.incremental=true
kotlin.code.style=official

# Android build speed knobs
android.nonTransitiveRClass=true
android.nonFinalResIds=true

# Robustness settings for slow networks/DNS
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=120000
systemProp.http.keepAlive=false
systemProp.org.gradle.internal.repository.max.retries=5
systemProp.org.gradle.internal.repository.max.tentatives=10
